
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:300px;
color:white;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
}

</style>
</head>

<body>

<div class="box">

<h2>Đăng nhập</h2>

<input placeholder="Tài khoản">
<input type="password" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

</div>

<script>

function login(){

alert("Đăng nhập thành công")

window.location.href="welcome.html"

}

</script>

</body>
</html>
