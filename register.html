<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#3b82f6;
text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Đăng ký</h2>

<input type="text" placeholder="Tên tài khoản">
<input type="password" placeholder="Mật khẩu">
<input type="password" placeholder="Nhập lại mật khẩu">

<button onclick="register()">Đăng ký</button>

<div class="link">
Đã có tài khoản? <a href="login.html">Đăng nhập</a>
</div>

</div>

<script>

function register(){

alert("Đăng ký thành công!");

window.location.href="login.html";

}

</script>

</body>
</html>
