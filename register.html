<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
}
</style>
</head>

<body>

<div class="box">

<h2>Đăng ký</h2>

<input id="user" placeholder="Tên tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

</div>

<script>

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

alert("Đăng ký thành công!")

window.location.href="login.html"

}

</script>

</body>
</html>
